name: Privacy Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  privacy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check runtime privacy
        run: npm run check:privacy

      - name: Build app
        run: npm run build
