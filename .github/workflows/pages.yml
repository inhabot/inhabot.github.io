name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test and check publishable files
        run: |
          npm test
          npm run check:secrets

      - name: Validate deployment secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          missing=()
          [[ -z "$CLOUDFLARE_ACCOUNT_ID" ]] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [[ -z "$CLOUDFLARE_API_TOKEN" ]] && missing+=("CLOUDFLARE_API_TOKEN")
          [[ -z "$OPENAI_API_KEY" ]] && missing+=("OPENAI_API_KEY")
          if (( ${#missing[@]} )); then
            echo "::error::Missing repository secrets: ${missing[*]}"
            exit 1
          fi

      - name: Deploy GPT API Worker
        id: worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "^4.36.0"
          command: deploy --minify
          secrets: |
            OPENAI_API_KEY
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Verify GPT API Worker
        env:
          API_BASE_URL: ${{ steps.worker.outputs.deployment-url }}
        run: curl --fail --retry 5 --retry-delay 2 "$API_BASE_URL/api/health"

      - name: Build static site
        env:
          PUBLIC_API_BASE_URL: ${{ steps.worker.outputs.deployment-url }}
          REQUIRE_API_BASE: "true"
        run: |
          npm run build:pages
          npm run check:secrets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
